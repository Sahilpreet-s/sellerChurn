version: "3.9"

services:
  ml:
    build:
      context: ./ml
    ports:
      - "8001:8001"
    volumes:
      - db_data:/data
    env_file:
      - ./backend/.env

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    volumes:
      - db_data:/data
    env_file:
      - ./backend/.env
    environment:
      - ML_SERVICE_URL=http://ml:8001
    depends_on:
      - ml

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_PROXY_TARGET=http://backend:8080
    depends_on:
      - backend

volumes:
  db_data:
